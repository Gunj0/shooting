<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Shooting</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hud">
        <h1 class="title">Mini Shooting</h1>
        <p class="scoreboard">
          SCORE: <span id="score">0</span>
          <span class="sep">|</span>
          HI: <span id="highScore">0</span>
          <span class="sep">|</span>
          DIFF: <span id="difficulty">1</span>
        </p>
      </header>

      <section class="game-shell" aria-label="シューティングゲーム">
        <div id="game" class="game-area"></div>

        <div id="titleOverlay" class="overlay" aria-live="polite">
          <div class="overlay-card">
            <p class="overlay-title">MINI SHOOTING</p>
            <p class="overlay-score">SPACE KEY / TAP TO START</p>
          </div>
        </div>

        <div id="gameOverOverlay" class="overlay hidden" aria-live="polite">
          <div class="overlay-card">
            <p class="overlay-title">GAME OVER</p>
            <p class="overlay-score">
              FINAL SCORE: <span id="finalScore">0</span>
            </p>
            <p class="overlay-score">SPACE KEY / TAP: QUICK RETRY</p>
            <button id="restartButton" class="restart-button" type="button">
              RESTART
            </button>
          </div>
        </div>
      </section>

      <p class="guide">スペースキーで開始・再開 / 左右キーで移動 | タップで開始 / 左右タップで移動</p>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
